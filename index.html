<head>
    <script src="jquery-3.5.0.min.js"></script>
    <script src="wordList.js"></script>
    <script src="app.js"></script>
    <link rel="stylesheet" href="app.css">
</head>
<body>
    <div id="controls" class="controlP">
        <input type="text" id="myInput" name="text" autocomplete="off" placeholder="Type a word and press Enter"> 
        <button id="restartButton" type="button">Restart</button>
    </div>
    <div id="hud" class="hud">
        <div id="score" class="score">Tu Puntaje: <span id="currentScore">0</span></div>
        <div id="lives" class="lives">Vidas: <span id="currentLives">3</span></div>
    </div>
    <div class="hint">Tip: remove words by typing them exactly and pressing Enter or Space.</div>
    <div id="gameScreen" class="gameScreen">
    </div>

</body>
