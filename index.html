<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TextWars: Typing Shooter</title>
    <script src="jquery-3.5.0.min.js"></script>
    <script src="wordList.js"></script>
    <script src="app.js" defer></script>
    <script src="benchmark.js" defer></script>
    <link rel="stylesheet" href="app.css">
</head>
<body>
    <main class="appShell">
        <header class="topBar">
            <h1>TEXTWARS // Typing Shooter</h1>
            <div class="badges">
                <span class="badge">Wave <strong id="currentWave">1</strong></span>
                <span class="badge">Combo <strong id="currentCombo">x1</strong></span>
                <span class="badge">Score <strong id="currentScore">0</strong></span>
                <span class="badge badgeLives">Lives <strong id="currentLives"></strong></span>
                <span class="badge badgeHigh">Best <strong id="currentHighScore">0</strong></span>
            </div>
        </header>

        <section class="controls">
            <input type="text" id="myInput" autocomplete="off" placeholder="Type enemy word + Enter / Space to shoot" />
            <button id="restartButton" type="button">Restart Match</button>
            <button id="benchmarkButton" type="button">⚡ Benchmark</button>
        </section>

        <section id="gameScreen" class="gameScreen" aria-label="Typing battlefield">
            <div class="scanlines"></div>
            <div class="stars"></div>
            <div id="wordLayer" class="wordLayer"></div>
            <div id="fxLayer" class="fxLayer"></div>
            <div id="cannon" class="cannon"></div>
            <div id="benchmarkPanel" class="benchmarkPanel hidden">
                <h2 class="bmTitle">⚡ AI Benchmark</h2>
                <p class="bmSubtitle">Simulating TextWars gameplay — Claude Haiku vs GPT-4o</p>
                <div id="bmProgress" class="bmProgress">
                    <div id="bmProgressFill" class="bmProgressFill"></div>
                </div>
                <div id="bmResults" class="hidden"></div>
            </div>
            <div id="gameOverPanel" class="gameOverPanel hidden">
                <h2>Mission Failed</h2>
                <p id="gameOverText">Press restart to deploy again.</p>
            </div>
        </section>

        <p class="hint">Destroy incoming words by typing exact matches. Faster clears = bigger combo score.</p>
    </main>
</body>
</html>
